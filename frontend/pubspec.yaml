name: college_management
description: Информационная система управления учебным процессом колледжа
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # HTTP & API
  dio: ^5.7.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # UI & Design
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  fl_chart: ^0.69.0

  # Forms
  reactive_forms: ^17.0.1

  # Utilities
  intl: ^0.19.0
  dartz: ^0.10.1
  get_it: ^8.0.2

  # Misc
  connectivity_plus: ^6.0.5
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/img/
